databases:
  - name: mrinal-portfolio-db
    plan: free

services:
  - type: web
    name: mrinal-portfolio-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && chmod +x render_start.sh
    startCommand: ./render_start.sh
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mrinal-portfolio-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://mrinal-portfolio-web.onrender.com
      - key: FRONTEND_URLS
        value: https://mrinal-portfolio-web.onrender.com,http://localhost:5173,http://127.0.0.1:5173
      - key: GITHUB_USERNAME
        value: mrinalvyas
      - key: ADMIN_EMAIL
        value: admin@portfolio.dev
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: mrinal-portfolio-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mrinal-portfolio-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
